<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euclidean Algorithm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: #4facfe;
            margin-bottom: 10px;
            text-align: center;
        }
        .description {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4facfe;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h3 {
            color: #4facfe;
            margin-bottom: 15px;
        }
        .result p {
            color: #333;
            line-height: 1.8;
            margin-bottom: 8px;
        }
        .steps {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid #4facfe;
        }
        .steps p {
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }
        .error {
            background: #fee;
            border-left: 4px solid #f44;
        }
        .error h3 {
            color: #f44;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Euclidean Algorithm</h1>
        <p class="description">Find GCD and LCM of two positive integers using the Euclidean Algorithm</p>
        
        <div class="input-group">
            <label for="firstInteger">First Integer (positive):</label>
            <input type="number" id="firstInteger" placeholder="Enter first positive integer">
        </div>
        
        <div class="input-group">
            <label for="secondInteger">Second Integer (positive):</label>
            <input type="number" id="secondInteger" placeholder="Enter second positive integer">
        </div>
        
        <button onclick="calculateEuclidean()">Calculate GCD & LCM</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        function validatePositiveInteger(value, fieldName) {
            if (value === '') {
                return `Please enter ${fieldName}`;
            }
            
            if (value.includes('.')) {
                return 'Decimals are not allowed. Please enter a whole number.';
            }
            
            const num = parseInt(value);
            
            if (isNaN(num)) {
                return 'Invalid input. Please enter a positive integer.';
            }
            
            if (num <= 0) {
                return 'Please enter a positive integer greater than zero.';
            }
            
            return null;
        }
        
        function formatNumber(num) {
            return num.toLocaleString();
        }
        
        function calculateEuclidean() {
            const input1 = document.getElementById('firstInteger').value.trim();
            const input2 = document.getElementById('secondInteger').value.trim();
            const resultDiv = document.getElementById('result');
            
            // Validate first integer
            const error1 = validatePositiveInteger(input1, 'the first integer');
            if (error1) {
                showError(error1);
                return;
            }
            
            // Validate second integer
            const error2 = validatePositiveInteger(input2, 'the second integer');
            if (error2) {
                showError(error2);
                return;
            }
            
            const a = parseInt(input1);
            const b = parseInt(input2);
            
            const m = Math.max(a, b);
            const n = Math.min(a, b);
            
            // Euclidean algorithm with steps
            const steps = [];
            let dividend = m;
            let divisor = n;
            let gcd;
            
            while (true) {
                const q = Math.floor(dividend / divisor);
                const r = dividend % divisor;
                
                if (r === 0) {
                    steps.push(`${dividend} = ${divisor}(${q})`);
                    gcd = divisor;
                    break;
                } else {
                    steps.push(`${dividend} = ${divisor}(${q}) + ${r}`);
                }
                
                dividend = divisor;
                divisor = r;
            }
            
            const lcm = Math.floor((m * n) / gcd);
            
            // Display result
            const stepsHTML = steps.map(step => `<p>${step}</p>`).join('');
            
            resultDiv.className = 'result show';
            resultDiv.innerHTML = `
                <h3>✅ SOLUTION</h3>
                <div class="steps">
                    ${stepsHTML}
                </div>
                <p><strong>The integers are:</strong> ${formatNumber(m)} and ${formatNumber(n)}</p>
                <p><strong>The greatest common divisor (GCD) of ${formatNumber(m)} and ${formatNumber(n)} is:</strong> ${formatNumber(gcd)}</p>
                <p><strong>The least common multiple (LCM) of ${formatNumber(m)} and ${formatNumber(n)} is:</strong> ${formatNumber(lcm)}</p>
            `;
        }
        
        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show error';
            resultDiv.innerHTML = `
                <h3>❌ Error</h3>
                <p>${message}</p>
            `;
        }
        
        // Allow Enter key to submit
        document.getElementById('secondInteger').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateEuclidean();
            }
        });
    </script>
</body>
</html>
