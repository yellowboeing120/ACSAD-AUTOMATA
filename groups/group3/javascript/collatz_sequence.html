<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collatz Sequence Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        .description {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .result p {
            color: #333;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .error {
            background: #fee;
            border-left: 4px solid #f44;
        }
        .error h3 {
            color: #f44;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Collatz Sequence Generator</h1>
        <p class="description">Enter an odd positive integer to generate its Collatz sequence</p>
        
        <div class="input-group">
            <label for="initialValue">Initial Value (odd positive integer):</label>
            <input type="number" id="initialValue" placeholder="Enter an odd positive integer (e.g., 7)">
        </div>
        
        <button onclick="generateCollatz()">Generate Sequence</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        function generateCollatz() {
            const input = document.getElementById('initialValue');
            const resultDiv = document.getElementById('result');
            const value = input.value.trim();
            
            // Validation
            if (value === '') {
                showError('Please enter a value');
                return;
            }
            
            if (value.includes('.')) {
                showError('Decimals are not allowed. Please enter a whole number.');
                return;
            }
            
            const n = parseInt(value);
            
            if (isNaN(n)) {
                showError('INVALID OUTPUT: Please enter a valid integer');
                return;
            }
            
            if (n <= 0) {
                showError('INVALID OUTPUT: Number must be positive');
                return;
            }
            
            if (n % 2 === 0) {
                showError('INVALID OUTPUT: Number must be odd');
                return;
            }
            
            // Generate Collatz sequence
            const sequence = [];
            let current = n;
            
            while (current !== 1) {
                sequence.push(current);
                if (current % 2 === 0) {
                    current = Math.floor(current / 2);
                } else {
                    current = 3 * current + 1;
                }
            }
            sequence.push(1);
            
            // Display result
            resultDiv.className = 'result show';
            resultDiv.innerHTML = `
                <h3>✅ Collatz Sequence</h3>
                <p><strong>Initial value:</strong> ${n}</p>
                <p><strong>Sequence:</strong> ${sequence.join(', ')}</p>
                <p><strong>Number of steps:</strong> ${sequence.length - 1}</p>
            `;
        }
        
        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show error';
            resultDiv.innerHTML = `
                <h3>❌ Error</h3>
                <p>${message}</p>
            `;
        }
        
        // Allow Enter key to submit
        document.getElementById('initialValue').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateCollatz();
            }
        });
    </script>
</body>
</html>
